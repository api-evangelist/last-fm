aid: last-fm
url: https://raw.githubusercontent.com/api-evangelist/last-fm/refs/heads/main/apis.yml
name: Last.fm
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
  - Music
  - Music Metadata
  - Scrobbling
  - Music Discovery
  - Streaming
description: >-
  Last.fm is a music discovery and social listening platform that tracks users' listening habits
  across devices and services via scrobbling. The Last.fm API provides access to a rich music
  metadata database covering artist information, album data, track details, user listening history,
  personalized charts, and music recommendations. Developers can integrate scrobbling, retrieve
  top charts by geography or tag, explore similar artists and tracks, and access user profile data.
created: '2026-06-13'
modified: '2026-06-13'

specificationVersion: '0.19'
apis:
  - aid: last-fm:last-fm-api
    name: Last.fm API
    tags:
      - Music
      - Artists
      - Albums
      - Tracks
      - Scrobbling
      - Charts
      - Users
    humanURL: https://www.last.fm/api
    baseURL: https://ws.audioscrobbler.com/2.0/
    properties:
      - url: https://www.last.fm/api
        type: Documentation
      - url: https://www.last.fm/api/intro
        type: GettingStarted
      - url: https://www.last.fm/api/authentication
        type: Authentication
      - url: https://www.last.fm/api/tos
        type: TermsOfService
      - url: openapi/last-fm-openapi.yml
        type: OpenAPI
      - url: json-ld/last-fm-context.jsonld
        type: JSONLDContext
      - url: json-schema/artist.json
        type: JSONSchema
      - url: json-schema/track.json
        type: JSONSchema
      - url: json-schema/scrobble.json
        type: JSONSchema
      - url: vocabulary/last-fm-vocabulary.yml
        type: Vocabulary
      - url: examples/artist-getInfo-response.json
        type: Example
      - url: examples/track-scrobble-request.json
        type: Example
      - url: examples/user-getRecentTracks-response.json
        type: Example
    description: >-
      The Last.fm API provides access to the Last.fm music platform, enabling developers to
      retrieve music metadata for artists, albums, and tracks; read and write user scrobble data;
      explore personalized recommendations; access global and geographic music charts; search the
      music catalog; and retrieve user listening histories and social data such as friends and
      loved tracks. Authentication is required for write operations including scrobbling. The API
      uses REST over HTTP with responses available in JSON or XML format.
